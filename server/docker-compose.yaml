version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: financial-tamagotchi-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123Secret_a
      POSTGRES_DB: financial_tamagotchi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  financial-server:
    build: .
    container_name: financial-tamagotchi-server
    ports:
      - "6767:6767"
    environment:
      DATABASE_URL: postgresql://postgres:123Secret_a@postgres:5432/financial_tamagotchi
    volumes:
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: